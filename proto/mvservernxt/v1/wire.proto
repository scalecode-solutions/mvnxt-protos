// Wire envelope: Command/Event split.
// - Client sends ClientEnvelope (a command). Server replies with Ack or Err.
// - Server pushes ServerEnvelope (wrapping Event) from event-log subscribers.
//
// See docs/v2/02-schema-first-wire-protocol.md and
//     docs/v2/03-event-log-internal-fabric.md.
syntax = "proto3";

package mvservernxt.v1;

import "google/protobuf/timestamp.proto";
import "mvservernxt/v1/chat.proto";
import "mvservernxt/v1/common.proto";
import "mvservernxt/v1/contacts.proto";
import "mvservernxt/v1/hello.proto";
import "mvservernxt/v1/identity.proto";
import "mvservernxt/v1/system.proto";

// ClientEnvelope is a command message from client to server.
// Every command receives exactly one Ack or Err, correlated by idempotency_key.
//
// Idempotency (see docs/v2/09-idempotency-keys.md): clients generate a fresh
// UUID on first send and reuse it on network-blip retries. The server caches
// the response for ~60s to return cached results on retries without
// re-executing the operation.
message ClientEnvelope {
  // Client-generated UUID. Required. Reused on retry.
  string idempotency_key = 1;

  // Exactly one payload must be set. Domain-specific command types
  // are added to the oneof as each domain lands.
  //
  // Convention: field numbers 10+ are reserved for domain commands so that
  // 1-9 can be used for envelope-level metadata without colliding.
  oneof payload {
    // System
    Ping  ping  = 10;
    Hello hello = 11;

    // Identity
    Register                register                   = 20;
    Authenticate            authenticate               = 21;
    Login                   login                      = 22;
    Refresh                 refresh                    = 23;
    Logout                  logout                     = 24;
    VerifyEmail             verify_email               = 25;
    ResendVerificationEmail resend_verification_email  = 26;

    // Chat (range extended to 30-50 as the surface grows. Contacts /
    // presence / receipts-v2 are tier-1 next — they get their own
    // domain ranges when they land.)
    CreateConversation      create_conversation        = 30;
    AddMember               add_member                 = 31;
    RemoveMember            remove_member              = 32;
    LeaveConversation       leave_conversation         = 33;
    SendMessage             send_message               = 34;
    ListConversations       list_conversations         = 35;
    GetMessages             get_messages               = 36;
    MarkRead                mark_read                  = 37;
    EditMessage             edit_message               = 38;
    DeleteMessage           delete_message             = 39;
    DeleteMessageForEveryone delete_message_for_everyone = 40;
    UnsendMessage           unsend_message             = 41;
    AddReaction             add_reaction               = 42;
    RemoveReaction          remove_reaction            = 43;
    SendTyping              send_typing                = 44;
    SetDisappearingMessages set_disappearing_messages  = 45;
    PinMessage              pin_message                = 46;
    UnpinMessage            unpin_message              = 47;
    SetConversationNickname set_conversation_nickname  = 48;
    UpdateConversationMetadata update_conversation_metadata = 49;
    MarkDelivered           mark_delivered             = 50;

    // Contacts (range 100-109)
    AddContact              add_contact                = 100;
    RemoveContact           remove_contact             = 101;
    ListContacts            list_contacts              = 102;
    SearchUsers             search_users               = 103;
    BlockUser               block_user                 = 104;
    UnblockUser             unblock_user               = 105;

    // Other domains land in their reserved ranges (chat 30-50 above,
    // contacts 100-109 above). Still to be claimed:
    //   110-119 presence
    //   120-129 pulse
    //   130-139 tangle
    //   140-149 calls
    //   150-159 media
  }
}

// ServerEnvelope is any message from server to client.
// Three distinct kinds:
//   - Ack:   your command succeeded
//   - Err:   your command failed
//   - Event: push from an event-log subscriber
message ServerEnvelope {
  oneof payload {
    Ack   ack   = 1;
    Err   err   = 2;
    Event event = 3;
  }
}

// Ack is returned for a successful command.
message Ack {
  // Correlates to ClientEnvelope.idempotency_key.
  string idempotency_key = 1;

  // HTTP-style status code (200 OK, 201 Created, 202 Accepted, 204 NoContent, ...).
  int32 code = 2;

  // Optional response payload. Oneof matches the command shape.
  oneof payload {
    // System
    Pong          pong  = 10;
    HelloResponse hello = 11;

    // Identity (Authenticate and Logout return empty Ack, no payload)
    RegisterResponse register = 20;
    LoginResponse    login    = 22;
    RefreshResponse  refresh  = 23;

    // Chat (AddMember, RemoveMember, LeaveConversation, MarkRead,
    // DeleteMessage, DeleteMessageForEveryone return empty Ack with no
    // payload)
    CreateConversationResponse create_conversation = 30;
    SendMessageResponse        send_message        = 34;
    ListConversationsResponse  list_conversations  = 35;
    GetMessagesResponse        get_messages        = 36;
    EditMessageResponse        edit_message        = 38;

    // Contacts (AddContact, RemoveContact, BlockUser, UnblockUser
    // return empty Ack with no payload)
    ListContactsResponse       list_contacts       = 102;
    SearchUsersResponse        search_users        = 103;
  }
}

// Err is returned for a failed command.
message Err {
  // Correlates to ClientEnvelope.idempotency_key.
  string idempotency_key = 1;

  // HTTP-style status code (400, 401, 403, 404, 409, 410, 429, 500, ...).
  int32 code = 2;

  // Human-readable message. Not for machine parsing.
  string message = 3;

  // Machine-readable reason code. Stable across releases.
  // Examples: "validation_failed", "token_reuse_detected", "forbidden",
  //           "rate_limited", "not_found".
  string reason = 4;
}

// Event is a push notification from a server-side event-log subscriber.
// Clients track a per-stream cursor (composed sync token, doc 04) so they
// can resume after reconnect without replaying everything.
message Event {
  // Position in the global event log.
  int64 seq = 1;

  // Stream name: "identity", "chat", "pulse", "tangle", "presence", ...
  // Drives per-stream cursors in the composed sync token.
  string stream = 2;

  // When the event was written to the log.
  google.protobuf.Timestamp timestamp = 3;

  // Who caused the event, if applicable.
  UUID actor_id = 4;

  // Aggregate this event pertains to (conv_id, user_id, pulse_id, ...).
  UUID aggregate_id = 5;

  // Kind-specific payload.
  oneof payload {
    // System
    SystemNotice system_notice = 10;

    // Identity
    UserRegistered             user_registered              = 20;
    UserLoggedIn               user_logged_in               = 22;
    TokenRefreshed             token_refreshed              = 23;
    UserLoggedOut              user_logged_out              = 24;
    RefreshTokenReuseDetected  refresh_token_reuse_detected = 25;
    EmailVerified              email_verified               = 26;
    VerificationEmailSent      verification_email_sent      = 27;

    // Chat
    ConversationCreated        conversation_created         = 30;
    MemberAdded                member_added                 = 31;
    MemberRemoved              member_removed               = 32;
    MemberLeft                 member_left                  = 33;
    MessageSent                message_sent                 = 34;
    ReadReceiptUpdated         read_receipt_updated         = 35;
    MessageEdited              message_edited               = 36;
    MessageHidden              message_hidden               = 37;
    MessageDeletedForEveryone  message_deleted_for_everyone = 38;
    MessageUnsent              message_unsent               = 39;
    MessageReactionAdded       message_reaction_added       = 40;
    MessageReactionRemoved     message_reaction_removed     = 41;
    TypingChanged              typing_changed               = 42;
    DisappearingMessagesChanged disappearing_messages_changed = 43;
    MessageExpired             message_expired              = 44;
    MessagePinned              message_pinned               = 45;
    MessageUnpinned            message_unpinned             = 46;
    ConversationNicknameChanged conversation_nickname_changed = 47;
    ConversationMetadataChanged conversation_metadata_changed = 48;
    DeliveryReceiptUpdated     delivery_receipt_updated     = 49;

    // Contacts (range 100-109)
    ContactAdded               contact_added                = 100;
    ContactRemoved             contact_removed              = 101;
    UserBlocked                user_blocked                 = 102;
    UserUnblocked              user_unblocked               = 103;
  }
}
