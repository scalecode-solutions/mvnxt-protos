// Sync: composed sync token + GetSync command.
//
// Reconnecting clients want a single round trip that catches them
// up across every domain — chat messages, identity events,
// contacts mutations, media notifications. v1's per-endpoint
// `since` parameters force N round trips and a single timestamp
// can't track streams that advance at different rates.
//
// The composed token is one cursor per stream, serialized as an
// opaque short string. Server parses it, reads each stream
// forward, returns the events plus the advanced token.
//
// See docs/v2/04-composed-sync-token.md for the design rationale.
syntax = "proto3";

package mvservernxt.v1;

// ============================================================================
// Commands
// ============================================================================

// GetSync requests events newer than the per-stream cursors
// encoded in `since`. Empty since = full fetch from the head of
// each stream (still capped by `limit`).
//
// Format of since (server-internal — clients treat it as opaque):
//   "v1:chat=<n>,identity=<n>,contacts=<n>,media=<n>"
// Streams missing from the token are treated as cursor=0.
message GetSync {
  // Opaque cursor from the previous response. "" on first call.
  string since = 1;

  // Per-stream limit. 0 means server default. Clamped to a
  // reasonable ceiling server-side.
  int32  limit = 2;
}

// SyncResponse lives in wire.proto alongside Event (definition
// reference; the import would be cyclic if it lived here).
